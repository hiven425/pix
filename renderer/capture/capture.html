<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Pix 截图</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="capture.css">
</head>
<body>
  <canvas id="captureCanvas"></canvas>

  <!-- 放大镜 -->
  <div id="magnifier" class="magnifier" style="display:none;">
    <canvas id="magnifierCanvas" class="magnifier-canvas" width="120" height="120"></canvas>
    <div class="magnifier-crosshair"></div>
    <div class="magnifier-info">
      <div id="magnifierColorDot" class="magnifier-color-dot"></div>
      <span id="magnifierCoord">0, 0</span>
    </div>
  </div>

  <!-- 选区信息 -->
  <div id="sizeInfo" class="size-info" style="display:none;">
    <span class="size-icon">⊡</span><span id="sizeText">0 × 0</span>
  </div>

  <!-- 双行工具栏 -->
  <div id="toolbar" class="toolbar" style="display:none;">
    <!-- 第一行: 标注工具 -->
    <div class="toolbar-row" id="toolbarAnnotation">
      <div class="toolbar-group">
        <button class="tool-btn" data-tool="rect" id="toolRect">
          <span class="tip">矩形</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1.5"/></svg>
        </button>
        <button class="tool-btn" data-tool="ellipse" id="toolEllipse">
          <span class="tip">椭圆</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="8" cy="8" rx="6" ry="4.5"/></svg>
        </button>
        <button class="tool-btn" data-tool="arrow" id="toolArrow">
          <span class="tip">箭头</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="13" x2="13" y2="3"/><polyline points="7,3 13,3 13,9"/></svg>
        </button>
        <button class="tool-btn" data-tool="pen" id="toolPen">
          <span class="tip">画笔</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 13 L11 5 M11 5 L13 3 M3 13 C5 11 7 9 9 8"/></svg>
        </button>
        <button class="tool-btn" data-tool="text" id="toolText">
          <span class="tip">文字</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M8 4v9"/><path d="M5.5 4V3M10.5 4V3"/></svg>
        </button>
        <button class="tool-btn" data-tool="mosaic" id="toolMosaic">
          <span class="tip">马赛克</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" opacity="0.65"><rect x="1" y="1" width="4" height="4" rx="0.5" opacity="0.8"/><rect x="6" y="1" width="4" height="4" rx="0.5" opacity="0.35"/><rect x="11" y="1" width="4" height="4" rx="0.5" opacity="0.65"/><rect x="1" y="6" width="4" height="4" rx="0.5" opacity="0.3"/><rect x="6" y="6" width="4" height="4" rx="0.5" opacity="0.9"/><rect x="11" y="6" width="4" height="4" rx="0.5" opacity="0.2"/><rect x="1" y="11" width="4" height="4" rx="0.5" opacity="0.7"/><rect x="6" y="11" width="4" height="4" rx="0.5" opacity="0.5"/><rect x="11" y="11" width="4" height="4" rx="0.5" opacity="0.45"/></svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- 颜色 + 线宽 -->
      <div class="toolbar-group">
        <div class="color-picker-wrap">
          <input type="color" id="toolColor" value="#ff4444" class="color-picker">
        </div>
        <div class="stroke-selector" id="strokeSelector">
          <button class="stroke-option active" data-stroke="2" title="细">
            <span class="stroke-dot s1"></span>
          </button>
          <button class="stroke-option" data-stroke="4" title="中">
            <span class="stroke-dot s2"></span>
          </button>
          <button class="stroke-option" data-stroke="6" title="粗">
            <span class="stroke-dot s3"></span>
          </button>
        </div>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group">
        <button class="tool-btn" id="btnUndo">
          <span class="tip">撤销 Ctrl+Z</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7h7a3 3 0 110 6H7"/><polyline points="6,4 3,7 6,10"/></svg>
        </button>
      </div>
    </div>

    <!-- 第二行: 操作按钮 -->
    <div class="toolbar-row">
      <div class="toolbar-group">
        <button class="tool-btn action-btn" id="btnOcr">
          <span class="tip">OCR 识别</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M4 7h2M4 10h4M10 7h2M10 10h2"/></svg>
        </button>
        <button class="tool-btn action-btn" id="btnPin">
          <span class="tip">贴图到桌面</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2 L10 6 L14 7 L10 10 L11 14 L8 12 L5 14 L6 10 L2 7 L6 6 Z"/></svg>
        </button>
        <button class="tool-btn action-btn" id="btnSave">
          <span class="tip">保存文件</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2h8l3 3v8a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M5 2v4h5V2"/><rect x="4" y="9" width="8" height="4" rx="0.5"/></svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <button class="tool-btn accent" id="btnCopy">
        <span class="tip">复制 Enter</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M2 11V3a1 1 0 011-1h8"/></svg>
      </button>

      <div class="toolbar-divider"></div>

      <button class="tool-btn cancel" id="btnCancel">
        <span class="tip">取消 Esc</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- 文字输入 -->
  <textarea id="textInput" class="text-input" style="display:none;" placeholder="输入文字..."></textarea>

  <script src="capture.js"></script>
</body>
</html>
