<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Pix OCR 识别</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="ocr.css">
</head>
<body>
  <!-- 标题栏 -->
  <div class="titlebar">
    <span class="titlebar-title">🔤 OCR 文字识别</span>
    <div class="titlebar-controls">
      <button class="titlebar-btn close" id="btnClose" title="关闭">✕</button>
    </div>
  </div>

  <div class="ocr-body">
    <!-- 进度状态 -->
    <div id="loadingState" class="loading-state">
      <div class="loading-spinner animate-spin">⏳</div>
      <p class="loading-text">正在识别文字...</p>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <!-- 识别结果 -->
    <div id="resultState" class="result-state" style="display:none;">
      <div class="result-header">
        <div class="result-info">
          <span class="confidence-badge" id="confidenceBadge">置信度: --</span>
        </div>
        <div class="result-actions">
          <button class="btn btn-ghost btn-sm" id="btnCopyAll" title="复制全部">📋 复制</button>
          <button class="btn btn-primary btn-sm" id="btnTranslate" title="翻译">🌐 翻译</button>
        </div>
      </div>

      <textarea class="result-text" id="resultText" readonly placeholder="识别结果将显示在这里..."></textarea>

      <!-- 翻译面板 -->
      <div id="translatePanel" class="translate-panel" style="display:none;">
        <div class="translate-header">
          <span class="translate-label">翻译结果</span>
          <div class="translate-controls">
            <select class="select" id="translateTo" style="width:auto;padding:2px 24px 2px 6px;font-size:12px;">
              <option value="zh-CN">中文</option>
              <option value="en">英语</option>
              <option value="ja">日语</option>
              <option value="ko">韩语</option>
              <option value="fr">法语</option>
              <option value="de">德语</option>
              <option value="es">西班牙语</option>
            </select>
            <button class="btn btn-ghost btn-sm" id="btnCopyTranslation">📋</button>
          </div>
        </div>
        <div id="translateLoading" class="translate-loading" style="display:none;">
          <span class="animate-pulse">翻译中...</span>
        </div>
        <textarea class="translate-text" id="translateText" readonly placeholder="翻译结果..."></textarea>
      </div>
    </div>

    <!-- 错误状态 -->
    <div id="errorState" class="error-state" style="display:none;">
      <div class="error-icon">⚠️</div>
      <p class="error-text" id="errorText">识别失败</p>
      <button class="btn btn-primary btn-sm" id="btnRetry">重试</button>
    </div>
  </div>

  <script src="ocr.js"></script>
</body>
</html>
